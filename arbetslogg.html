<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arbetslogg — Mobil Bilvård Åland</title>

  <!-- PWA: iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arbetslogg">

  <!-- PWA: Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0c0c0e">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0c0c0e;
      --bg-secondary:  #111113;
      --bg-card:       #1c1c1e;
      --bg-card-hover: #252527;
      --bg-glass:      rgba(12,12,14,0.92);
      --text-primary:  #f2f2f7;
      --text-secondary:#8e8e93;
      --text-muted:    #636366;
      --accent:        #C8A96E;
      --accent-hover:  #b8965a;
      --accent-dim:    rgba(200,169,110,0.12);
      --accent-border: rgba(200,169,110,0.35);
      --border:        rgba(255,255,255,0.07);
      --font-heading:  'Space Grotesk', -apple-system, sans-serif;
      --font-body:     'DM Sans', -apple-system, sans-serif;
      --radius-sm:     12px;
      --radius-md:     16px;
      --radius-lg:     22px;
      --transition:    0.2s ease;
      --tab-bar-height: 90px;
      --top-bar-height: 60px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Toppbar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--top-bar-height);
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
    }
    .top-bar__logo {
      width: 6px; height: 28px;
      background: linear-gradient(180deg, var(--accent), var(--accent-hover));
      border-radius: 3px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .top-bar__title {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .top-bar__sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
      letter-spacing: 0.04em;
    }

    /* ── Flikinnehåll ── */
    .tab-content {
      flex: 1;
      margin-top: var(--top-bar-height);
      margin-bottom: calc(var(--tab-bar-height) + env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel {
      display: none;
      padding: 1.5rem 1.25rem;
      min-height: 100%;
    }
    .tab-panel.active { display: block; }

    /* ── Nedre tabbfält ── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      /* Guldbård överst — tabbar ligger tydligt UNDER den */
      border-top: 1.5px solid var(--accent-border);
      display: flex;
      align-items: center;
      gap: 10px;
      /* padding-top skapar luft mellan linjen och knapparna */
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      z-index: 100;
    }

    /* Varje tabb är en synlig kortknapp */
    .tab-btn {
      flex: 1;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 6px;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      color: var(--text-muted);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tab-btn:active {
      transform: scale(0.96);
    }
    /* Aktiv tabb: guldton och guldram */
    .tab-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .tab-btn__icon {
      font-size: 22px;
      line-height: 1;
    }
    .tab-btn__label {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-body);
      letter-spacing: 0.02em;
    }

    /* ── Sektionsrubrik ── */
    .section-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }
    .section-title__line {
      width: 36px; height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 2px;
      margin-bottom: 1.25rem;
    }
    .section-title--sub {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    /* ── Statistikkort ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      /* Guldlinje i toppen av varje kort */
      border-top: 2px solid var(--accent);
      border-radius: var(--radius-md);
      padding: 1rem 0.75rem 0.9rem;
      text-align: center;
    }
    .stat-card__label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .stat-card__value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-heading);
      letter-spacing: -0.02em;
    }

    /* ── Paketstatistik ── */
    .pkg-stats { margin-bottom: 1.75rem; }
    .pkg-stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pkg-stat-row__name {
      font-size: 13px;
      color: var(--text-secondary);
      width: 115px;
      flex-shrink: 0;
    }
    /* Game-style hunger bar — tydlig bår med djup och glöd */
    .pkg-stat-row__bar-wrap {
      flex: 1;
      height: 20px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .pkg-stat-row__bar {
      height: 100%;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.18) 0%,
        var(--accent) 30%,
        var(--accent-hover) 100%);
      border-radius: 5px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(200,169,110,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
    }
    /* Lysskant längst upp i baren */
    .pkg-stat-row__bar::after {
      content: '';
      position: absolute;
      top: 2px; left: 3px; right: 3px;
      height: 4px;
      background: rgba(255,255,255,0.22);
      border-radius: 3px;
    }
    .pkg-stat-row__amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      width: 55px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Senaste jobb ── */
    .recent-list { display: flex; flex-direction: column; gap: 10px; }
    .recent-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 0.9rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .recent-item__left { display: flex; flex-direction: column; gap: 3px; }
    .recent-item__pkg  { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .recent-item__date { font-size: 12px; color: var(--text-muted); }
    .recent-item__price { font-size: 16px; font-weight: 700; color: var(--accent); font-family: var(--font-heading); }

    /* ── Tom-state ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .empty-state__icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

    /* ── Formulär ── */
    .form-group { margin-bottom: 1.5rem; }
    .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      display: block;
      margin-bottom: 10px;
    }

    /* ── Val-knappar (paket & storlek) ── */
    .choice-grid   { display: flex; flex-direction: column; gap: 10px; }
    .choice-grid--3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .choice-btn {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.1rem;
      cursor: pointer;
      text-align: left;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn:hover  { border-color: rgba(255,255,255,0.15); background: var(--bg-card-hover); }
    .choice-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 1px var(--accent-border) inset;
    }
    .choice-btn__name  { font-size: 14px; font-weight: 600; color: var(--text-primary); display: block; }
    .choice-btn__price { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: block; }
    .choice-btn__size  { font-size: 13px; font-weight: 600; color: var(--text-primary); display: block; }
    .choice-btn__note  { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: block; }

    /* ── Textinput ── */
    .form-input {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem;
      font-size: 15px;
      font-family: var(--font-body);
      color: var(--text-primary);
      transition: border-color var(--transition);
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
    }
    .form-input::placeholder { color: var(--text-muted); }

    /* ── Spara-knapp ── */
    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #0c0c0e;
      border: none;
      border-radius: var(--radius-sm);
      padding: 1.1rem;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-heading);
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      margin-top: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:hover  { opacity: 0.9; }
    .save-btn:active { transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--tab-bar-height) + env(safe-area-inset-bottom) + 0.75rem);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--bg-card);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1.3rem;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Historia ── */
    .history-list { display: flex; flex-direction: column; gap: 12px; }
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-border);
      border-radius: var(--radius-md);
      padding: 1.1rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      transition: border-left-color var(--transition);
    }
    .history-item:hover { border-left-color: var(--accent); }
    .history-item__info { flex: 1; }
    .history-item__pkg  { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .history-item__meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .history-item__note { font-size: 12px; color: var(--text-secondary); margin-top: 5px; font-style: italic; }
    .history-item__right { text-align: right; flex-shrink: 0; }
    .history-item__price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-heading);
    }
    .history-item__delete {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      margin-top: 6px;
      display: block;
      transition: color var(--transition);
      font-family: var(--font-body);
    }
    .history-item__delete:hover { color: #ff453a; }

    /* ── Upsell-knappar (flerval) ── */
    .upsell-grid { display: flex; flex-direction: column; gap: 10px; }
    .upsell-btn {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .upsell-btn:active { transform: scale(0.98); }
    .upsell-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .upsell-btn__left { display: flex; flex-direction: column; gap: 2px; }
    .upsell-btn__name  { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .upsell-btn__desc  { font-size: 11px; color: var(--text-muted); }
    .upsell-btn__price { font-size: 14px; font-weight: 700; color: var(--accent); }
    .upsell-btn__check {
      width: 22px; height: 22px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: background var(--transition), border-color var(--transition);
      flex-shrink: 0;
    }
    .upsell-btn.selected .upsell-btn__check {
      background: var(--accent);
      border-color: var(--accent);
      color: #0c0c0e;
    }

    /* ── Netto-rad på dashboard ── */
    .netto-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
    }
    .netto-row__label { font-size: 13px; color: var(--text-secondary); }
    .netto-row__value {
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--font-heading);
      letter-spacing: -0.02em;
    }
    /* Grön/röd beroende på om netto är positivt eller negativt */
    .netto-row__value--pos { color: var(--accent); }
    .netto-row__value--neg { color: #ff453a; }

    /* ── Kategori-knappar (utgiftsformulär) ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .cat-btn {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.9rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:active { transform: scale(0.98); }
    .cat-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .cat-btn__icon { font-size: 22px; line-height: 1; }
    .cat-btn__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }

    /* Hjälptext som visas när bensin är valt */
    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: -0.75rem;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    /* Utgiftsposter i historik — röd vänsterkant skiljer dem från inkomster */
    .expense-item { border-left-color: rgba(255, 69, 58, 0.45) !important; }
    .expense-item:hover { border-left-color: #ff453a !important; }
    .expense-item .history-item__price { color: #ff453a; }

    /* ── Accessibility ── */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- Toppbar med guldaccent -->
  <header class="top-bar">
    <div class="top-bar__logo" aria-hidden="true"></div>
    <span class="top-bar__title">Arbetslogg</span>
    <span class="top-bar__sub">Mobil Bilvård Åland</span>
  </header>

  <!-- Flikpaneler -->
  <main class="tab-content">

    <!-- HEM -->
    <div id="tab-hem" class="tab-panel active">
      <h2 class="section-title">Översikt</h2>
      <div class="section-title__line"></div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card__label">Denna vecka</div>
          <div class="stat-card__value" id="stat-week">0 €</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Denna månad</div>
          <div class="stat-card__value" id="stat-month">0 €</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Totalt</div>
          <div class="stat-card__value" id="stat-total">0 €</div>
        </div>
      </div>

      <!-- Netto = intäkter minus utgifter för innevarande månad -->
      <div class="netto-row" id="netto-row">
        <span class="netto-row__label">Netto denna månad</span>
        <span class="netto-row__value netto-row__value--pos" id="netto-month">0 €</span>
      </div>

      <h3 class="section-title section-title--sub">Intäkt per paket</h3>
      <div class="section-title__line"></div>
      <div class="pkg-stats" id="pkg-stats"></div>

      <h3 class="section-title section-title--sub">Senaste jobb</h3>
      <div class="section-title__line"></div>
      <div class="recent-list" id="recent-list"></div>
    </div>

    <!-- LOGGA -->
    <div id="tab-logga" class="tab-panel">
      <h2 class="section-title">Logga jobb</h2>
      <div class="section-title__line"></div>

      <div class="form-group">
        <label class="form-label">Paket</label>
        <div class="choice-grid" id="pkg-btns"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Bilstorlek</label>
        <div class="choice-grid--3" id="size-btns"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-price">Pris (€)</label>
        <input type="number" id="input-price" class="form-input" placeholder="Beräknas automatiskt" min="0">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-date">Datum</label>
        <input type="date" id="input-date" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-duration">Tidsåtgång — minuter (valfritt)</label>
        <input type="number" id="input-duration" class="form-input" placeholder="t.ex. 90" min="1">
      </div>

      <div class="form-group">
        <label class="form-label" for="input-note">Anteckning (valfritt)</label>
        <input type="text" id="input-note" class="form-input" placeholder="t.ex. husdjurshår, extra smutsig">
      </div>

      <div class="form-group">
        <label class="form-label">Upsell (valfritt)</label>
        <div class="upsell-grid" id="upsell-btns"></div>
      </div>

      <button type="button" class="save-btn" id="save-btn" disabled onclick="saveJob()">Spara jobb</button>
    </div>

    <!-- UTGIFTER -->
    <div id="tab-utgifter" class="tab-panel">
      <h2 class="section-title">Lägg till utgift</h2>
      <div class="section-title__line"></div>

      <div class="form-group">
        <label class="form-label">Kategori</label>
        <div class="cat-grid" id="cat-btns"></div>
      </div>

      <!-- Visas enbart när "Bensin" är valt -->
      <p class="form-hint" id="bensin-hint" style="display:none;">
        Ange enbart den del som gäller jobbet.
      </p>

      <div class="form-group">
        <label class="form-label" for="exp-amount">Belopp (€)</label>
        <input type="number" id="exp-amount" class="form-input" placeholder="t.ex. 25" min="0" oninput="updateExpSaveBtn()">
      </div>

      <div class="form-group">
        <label class="form-label" for="exp-date">Datum</label>
        <input type="date" id="exp-date" class="form-input" oninput="updateExpSaveBtn()">
      </div>

      <div class="form-group">
        <label class="form-label" for="exp-note">Anteckning (valfritt)</label>
        <input type="text" id="exp-note" class="form-input" placeholder="t.ex. rengöringsmedel, mikrofiberdukar">
      </div>

      <button type="button" class="save-btn" id="exp-save-btn" disabled onclick="saveExpense()">Spara utgift</button>

      <h3 class="section-title section-title--sub" style="margin-top:2rem;">Utgiftshistorik</h3>
      <div class="section-title__line"></div>
      <div class="history-list" id="exp-history-list"></div>
    </div>

    <!-- HISTORIA -->
    <div id="tab-historia" class="tab-panel">
      <h2 class="section-title">Historia</h2>
      <div class="section-title__line"></div>
      <div class="history-list" id="history-list"></div>
    </div>

  </main>

  <!-- Nedre tabbfält — knappar sitter under guldlinjen -->
  <nav class="tab-bar" aria-label="Flikar">
    <button type="button" class="tab-btn active" data-tab="hem" onclick="showTab('hem')">
      <span class="tab-btn__icon">📊</span>
      <span class="tab-btn__label">Hem</span>
    </button>
    <button type="button" class="tab-btn" data-tab="logga" onclick="showTab('logga')">
      <span class="tab-btn__icon">➕</span>
      <span class="tab-btn__label">Logga</span>
    </button>
    <button type="button" class="tab-btn" data-tab="historia" onclick="showTab('historia')">
      <span class="tab-btn__icon">📋</span>
      <span class="tab-btn__label">Historia</span>
    </button>
    <button type="button" class="tab-btn" data-tab="utgifter" onclick="showTab('utgifter')">
      <span class="tab-btn__icon">💸</span>
      <span class="tab-btn__label">Utgifter</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    // ── Fliknavigering ────────────────────────────────────────
    function showTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const panel = document.getElementById('tab-' + name);
      const btn   = document.querySelector('[data-tab="' + name + '"]');
      if (!panel || !btn) return;
      panel.classList.add('active');
      btn.classList.add('active');
      if (name === 'hem')      renderHem();
      if (name === 'historia') renderHistoria();
      if (name === 'utgifter') renderUtgifter();
    }

    // ── Konstanter ────────────────────────────────────────────
    const STORAGE_KEY = 'mba_jobs';

    const PACKAGES = [
      { id: 'yttre',    label: 'Yttre fräschning', base: 45  },
      { id: 'komplett', label: 'Komplett rekond',   base: 110 },
      { id: 'plus',     label: 'Rekond Plus',       base: 160 }
    ];

    const SIZES = [
      { id: 'liten',      label: 'Liten',      note: 'Sedan, Kombi', mult: 1.0  },
      { id: 'mellanstor', label: 'Mellanstor', note: 'SUV, MPV',      mult: 1.2  },
      { id: 'stor',       label: 'Stor',       note: 'Van, Skåpbil',  mult: 1.45 }
    ];

    const UPSELLS = [
      { id: 'keramiskt_vax',        label: 'Keramiskt vax',        desc: 'Långvarigt keramiskt skyddsskikt', price: 50 },
      { id: 'tackglans',            label: 'Däckglans',            desc: 'Glansbehandling av däck och gummi', price: 15 },
      { id: 'stralkastarpolering',  label: 'Strålkastarpolering',  desc: 'Polering av gulnade strålkastare',  price: 45 }
    ];

    // ── Datalager ─────────────────────────────────────────────
    function loadJobs() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }
    function saveJobs(jobs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
    }
    function addJob(job) {
      const jobs = loadJobs();
      job.id = String(Date.now());
      jobs.unshift(job);
      saveJobs(jobs);
      return job;
    }
    function deleteJob(id) {
      saveJobs(loadJobs().filter(j => j.id !== id));
    }

    // ── Formulär ──────────────────────────────────────────────
    const formState = { pkg: null, size: null, upsells: new Set() };

    function initForm() {
      const pkgContainer = document.getElementById('pkg-btns');
      PACKAGES.forEach(p => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice-btn';
        btn.dataset.id = p.id;
        btn.innerHTML =
          '<span class="choice-btn__name">' + p.label + '</span>' +
          '<span class="choice-btn__price">från ' + p.base + ' €</span>';
        btn.onclick = () => selectPkg(p.id);
        pkgContainer.appendChild(btn);
      });

      const sizeContainer = document.getElementById('size-btns');
      SIZES.forEach(s => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice-btn';
        btn.dataset.id = s.id;
        btn.innerHTML =
          '<span class="choice-btn__size">' + s.label + '</span>' +
          '<span class="choice-btn__note">' + s.note + '</span>';
        btn.onclick = () => selectSize(s.id);
        sizeContainer.appendChild(btn);
      });

      document.getElementById('input-date').value = todayISO();

      // Bygg upsell-knappar (flerval)
      const upsellContainer = document.getElementById('upsell-btns');
      UPSELLS.forEach(u => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'upsell-btn';
        btn.dataset.id = u.id;
        btn.innerHTML =
          '<div class="upsell-btn__left">' +
            '<span class="upsell-btn__name">' + u.label + '</span>' +
            '<span class="upsell-btn__desc">' + u.desc + '</span>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
            '<span class="upsell-btn__price">+' + u.price + ' €</span>' +
            '<div class="upsell-btn__check"></div>' +
          '</div>';
        btn.onclick = () => toggleUpsell(u.id);
        upsellContainer.appendChild(btn);
      });
    }

    function selectPkg(id) {
      formState.pkg = id;
      document.querySelectorAll('#pkg-btns .choice-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.id === id));
      updateAutoPrice();
      updateSaveBtn();
    }

    function selectSize(id) {
      formState.size = id;
      document.querySelectorAll('#size-btns .choice-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.id === id));
      updateAutoPrice();
      updateSaveBtn();
    }

    function toggleUpsell(id) {
      if (formState.upsells.has(id)) {
        formState.upsells.delete(id);
      } else {
        formState.upsells.add(id);
      }
      document.querySelectorAll('#upsell-btns .upsell-btn').forEach(b => {
        const active = formState.upsells.has(b.dataset.id);
        b.classList.toggle('selected', active);
        b.querySelector('.upsell-btn__check').textContent = active ? '✓' : '';
      });
      updateAutoPrice();
    }

    function updateAutoPrice() {
      if (!formState.pkg || !formState.size) return;
      const pkg  = PACKAGES.find(p => p.id === formState.pkg);
      const size = SIZES.find(s => s.id === formState.size);
      const basePrice = Math.round(pkg.base * size.mult);
      const upsellTotal = [...formState.upsells]
        .reduce((sum, id) => sum + (UPSELLS.find(u => u.id === id)?.price || 0), 0);
      document.getElementById('input-price').value = basePrice + upsellTotal;
    }

    function updateSaveBtn() {
      const price = document.getElementById('input-price').value;
      const date  = document.getElementById('input-date').value;
      document.getElementById('save-btn').disabled =
        !(formState.pkg && formState.size && price && date);
    }

    document.addEventListener('DOMContentLoaded', () => {
      initForm();
      initExpForm();
      renderHem();
      document.getElementById('input-price').addEventListener('input', updateSaveBtn);
      document.getElementById('input-date').addEventListener('input', updateSaveBtn);
    });

    function saveJob() {
      const pkg  = PACKAGES.find(p => p.id === formState.pkg);
      const size = SIZES.find(s => s.id === formState.size);
      const selectedUpsells = [...formState.upsells].map(id => {
        const u = UPSELLS.find(u => u.id === id);
        return { id: u.id, label: u.label, price: u.price };
      });
      addJob({
        date:         document.getElementById('input-date').value,
        package:      pkg.id,
        packageLabel: pkg.label,
        size:         size.label,
        sizeMult:     size.mult,
        price:        parseFloat(document.getElementById('input-price').value),
        duration:     parseInt(document.getElementById('input-duration').value) || null,
        note:         document.getElementById('input-note').value.trim(),
        upsells:      selectedUpsells
      });
      resetForm();
      showToast('Jobb sparat ✓');
      showTab('hem');
    }

    function resetForm() {
      formState.pkg = null;
      formState.size = null;
      formState.upsells.clear();
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.upsell-btn').forEach(b => {
        b.classList.remove('selected');
        b.querySelector('.upsell-btn__check').textContent = '';
      });
      document.getElementById('input-price').value   = '';
      document.getElementById('input-date').value    = todayISO();
      document.getElementById('input-duration').value = '';
      document.getElementById('input-note').value    = '';
      document.getElementById('save-btn').disabled = true;
    }

    // ── Hjälpfunktioner ───────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }
    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      return d + '.' + m + '.' + y;
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Hem-dashboard ─────────────────────────────────────────
    function renderHem() {
      const jobs = loadJobs();
      const now  = new Date();
      const wkStart = mondayOfWeek(now);
      const moStart = new Date(now.getFullYear(), now.getMonth(), 1);

      let sumWeek = 0, sumMonth = 0, sumTotal = 0;
      jobs.forEach(j => {
        const [jy, jm, jd] = j.date.split('-').map(Number);
        const d = new Date(jy, jm - 1, jd);
        sumTotal += j.price;
        if (d >= moStart) sumMonth += j.price;
        if (d >= wkStart) sumWeek  += j.price;
      });

      document.getElementById('stat-week').textContent  = sumWeek  + ' €';
      document.getElementById('stat-month').textContent = sumMonth + ' €';
      document.getElementById('stat-total').textContent = sumTotal + ' €';

      // Netto denna månad = intäkter minus utgifter samma period
      const expenses = loadExpenses();
      let expMonth = 0;
      expenses.forEach(e => {
        const [ey, em] = e.date.split('-').map(Number);
        if (ey === now.getFullYear() && em === now.getMonth() + 1) expMonth += e.amount;
      });
      const netto = sumMonth - expMonth;
      const nettoEl = document.getElementById('netto-month');
      nettoEl.textContent = netto + ' €';
      nettoEl.className = 'netto-row__value ' + (netto >= 0 ? 'netto-row__value--pos' : 'netto-row__value--neg');

      // Paketstatistik
      const pkgTotals = {};
      PACKAGES.forEach(p => { pkgTotals[p.id] = 0; });
      jobs.forEach(j => { pkgTotals[j.package] = (pkgTotals[j.package] || 0) + j.price; });
      const maxPkg = Math.max(...Object.values(pkgTotals), 1);

      let pkgHtml = '';
      PACKAGES.forEach(p => {
        const amt = pkgTotals[p.id] || 0;
        const pct = Math.round((amt / maxPkg) * 100);
        pkgHtml +=
          '<div class="pkg-stat-row">' +
            '<span class="pkg-stat-row__name">' + p.label + '</span>' +
            '<div class="pkg-stat-row__bar-wrap">' +
              '<div class="pkg-stat-row__bar" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<span class="pkg-stat-row__amount">' + amt + ' €</span>' +
          '</div>';
      });

      // Upselling som en fjärde rad i samma lista
      const upsellTotal = jobs.reduce((sum, j) => {
        if (!j.upsells) return sum;
        return sum + j.upsells.reduce((s, u) => s + u.price, 0);
      }, 0);
      const upsellPct = Math.round((upsellTotal / Math.max(...Object.values(pkgTotals), upsellTotal, 1)) * 100);
      pkgHtml +=
        '<div class="pkg-stat-row">' +
          '<span class="pkg-stat-row__name" style="color:var(--accent)">Upselling</span>' +
          '<div class="pkg-stat-row__bar-wrap">' +
            '<div class="pkg-stat-row__bar" style="width:' + upsellPct + '%"></div>' +
          '</div>' +
          '<span class="pkg-stat-row__amount">' + upsellTotal + ' €</span>' +
        '</div>';

      document.getElementById('pkg-stats').innerHTML = pkgHtml;

      // Senaste 3 jobb
      const recent = jobs.slice(0, 3);
      if (recent.length === 0) {
        document.getElementById('recent-list').innerHTML =
          '<div class="empty-state"><div class="empty-state__icon">🚗</div>' +
          'Inga jobb loggade ännu.<br>Tryck på <strong>Logga</strong> för att börja.</div>';
        return;
      }
      let recentHtml = '';
      recent.forEach(j => {
        recentHtml +=
          '<div class="recent-item">' +
            '<div class="recent-item__left">' +
              '<span class="recent-item__pkg">' + escapeHtml(j.packageLabel) + ' · ' + escapeHtml(j.size) + '</span>' +
              '<span class="recent-item__date">' + formatDate(j.date) + '</span>' +
            '</div>' +
            '<span class="recent-item__price">' + j.price + ' €</span>' +
          '</div>';
      });
      document.getElementById('recent-list').innerHTML = recentHtml;
    }

    function mondayOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      d.setHours(0, 0, 0, 0);
      return d;
    }

    // ── Historia ──────────────────────────────────────────────
    function renderHistoria() {
      const jobs = loadJobs();
      const container = document.getElementById('history-list');
      if (jobs.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><div class="empty-state__icon">📋</div>Inga jobb loggade ännu.</div>';
        return;
      }
      let html = '';
      jobs.forEach(j => {
        const meta = [escapeHtml(j.size), j.duration ? j.duration + ' min' : null]
          .filter(Boolean).join(' · ');
        html +=
          '<div class="history-item">' +
            '<div class="history-item__info">' +
              '<div class="history-item__pkg">' + escapeHtml(j.packageLabel) + '</div>' +
              '<div class="history-item__meta">' + formatDate(j.date) + (meta ? ' · ' + meta : '') + '</div>' +
              (j.note ? '<div class="history-item__note">' + escapeHtml(j.note) + '</div>' : '') +
            '</div>' +
            '<div class="history-item__right">' +
              '<div class="history-item__price">' + j.price + ' €</div>' +
              '<button type="button" class="history-item__delete" onclick="confirmDelete(\'' + j.id + '\')">Radera</button>' +
            '</div>' +
          '</div>';
      });
      container.innerHTML = html;
    }

    function confirmDelete(id) {
      if (confirm('Radera detta jobb? Det påverkar statistiken.')) {
        deleteJob(id);
        renderHistoria();
        renderHem();
      }
    }

    // ── Utgiftskonstanter ─────────────────────────────────────
    const STORAGE_KEY_EXP = 'mba_expenses';

    const EXPENSE_CATS = [
      { id: 'produkter',  label: 'Produkter',  icon: '🧴' },
      { id: 'bensin',     label: 'Bensin',     icon: '⛽' },
      { id: 'utrustning', label: 'Utrustning', icon: '🔧' },
      { id: 'ovrigt',     label: 'Övrigt',     icon: '📦' }
    ];

    // ── Utgiftsdatalager ──────────────────────────────────────
    function loadExpenses() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY_EXP) || '[]'); }
      catch { return []; }
    }
    function saveExpenses(list) {
      localStorage.setItem(STORAGE_KEY_EXP, JSON.stringify(list));
    }
    function addExpense(exp) {
      const list = loadExpenses();
      exp.id = String(Date.now());
      list.unshift(exp);
      saveExpenses(list);
      return exp;
    }
    function deleteExpense(id) {
      saveExpenses(loadExpenses().filter(e => e.id !== id));
    }

    // ── Utgiftsformulär ───────────────────────────────────────
    const expFormState = { cat: null };

    function initExpForm() {
      const container = document.getElementById('cat-btns');
      EXPENSE_CATS.forEach(c => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cat-btn';
        btn.dataset.id = c.id;
        btn.innerHTML =
          '<span class="cat-btn__icon">' + c.icon + '</span>' +
          '<span class="cat-btn__name">' + c.label + '</span>';
        btn.onclick = () => selectCat(c.id);
        container.appendChild(btn);
      });
      document.getElementById('exp-date').value = todayISO();
    }

    function selectCat(id) {
      expFormState.cat = id;
      document.querySelectorAll('.cat-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.id === id));
      // Bensintipset visas enbart när bensin är vald kategori
      document.getElementById('bensin-hint').style.display =
        id === 'bensin' ? 'block' : 'none';
      updateExpSaveBtn();
    }

    function updateExpSaveBtn() {
      const amount = document.getElementById('exp-amount').value;
      const date   = document.getElementById('exp-date').value;
      document.getElementById('exp-save-btn').disabled =
        !(expFormState.cat && amount && date);
    }

    function saveExpense() {
      const cat = EXPENSE_CATS.find(c => c.id === expFormState.cat);
      addExpense({
        date:     document.getElementById('exp-date').value,
        cat:      cat.id,
        catLabel: cat.label,
        catIcon:  cat.icon,
        amount:   parseFloat(document.getElementById('exp-amount').value),
        note:     document.getElementById('exp-note').value.trim()
      });
      resetExpForm();
      showToast('Utgift sparad ✓');
      renderUtgifter();
      renderHem();
    }

    function resetExpForm() {
      expFormState.cat = null;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('bensin-hint').style.display = 'none';
      document.getElementById('exp-amount').value = '';
      document.getElementById('exp-date').value   = todayISO();
      document.getElementById('exp-note').value   = '';
      document.getElementById('exp-save-btn').disabled = true;
    }

    // ── Rendera utgiftshistorik ───────────────────────────────
    function renderUtgifter() {
      const list = loadExpenses();
      const container = document.getElementById('exp-history-list');
      if (list.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><div class="empty-state__icon">💸</div>Inga utgifter loggade ännu.</div>';
        return;
      }
      let html = '';
      list.forEach(e => {
        html +=
          '<div class="history-item expense-item">' +
            '<div class="history-item__info">' +
              '<div class="history-item__pkg">' + escapeHtml(e.catIcon) + ' ' + escapeHtml(e.catLabel) + '</div>' +
              '<div class="history-item__meta">' + formatDate(e.date) + '</div>' +
              (e.note ? '<div class="history-item__note">' + escapeHtml(e.note) + '</div>' : '') +
            '</div>' +
            '<div class="history-item__right">' +
              '<div class="history-item__price">−' + e.amount + ' €</div>' +
              '<button type="button" class="history-item__delete" onclick="confirmDeleteExpense(\'' + e.id + '\')">Radera</button>' +
            '</div>' +
          '</div>';
      });
      container.innerHTML = html;
    }

    function confirmDeleteExpense(id) {
      if (confirm('Radera denna utgift?')) {
        deleteExpense(id);
        renderUtgifter();
        renderHem();
      }
    }
  </script>
</body>
</html>
